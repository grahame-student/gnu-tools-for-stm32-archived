---
name: Build toolchain

on:
  workflow_dispatch:
  pull_request:
    # Run on pull requests to any branch

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint-and-check:
    name: Lint and Drift Check
    runs-on: ubuntu-latest

    permissions:
      # contents: read - Required to checkout the repository code
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6.0.1

      - name: Install linting tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf autoconf2.69 automake libtool autogen shellcheck

      - name: Verify tool versions
        shell: bash
        run: |
          echo "=== Autotools versions ==="
          autoconf --version | head -1
          autoconf2.69 --version | head -1
          automake --version | head -1
          shellcheck --version | head -3
          
      - name: Lint shell scripts
        shell: bash
        run: |
          echo "=== Linting shell scripts with shellcheck ==="
          # Lint all .sh files in the root directory
          # SC1091: Not following sourced files (scripts source build-common.sh)
          # SC2148: Tips for adding shebang (handled by project conventions)
          # SC2034: Variables unused in build-common.sh but used by sourcing scripts
          for script in *.sh; do
            if [ -f "$script" ]; then
              echo "Checking $script..."
              shellcheck -e SC1091,SC2148,SC2034 "$script" || exit 1
            fi
          done
          echo "All shell scripts passed linting"

      - name: Lint autotools configurations
        shell: bash
        run: |
          echo "=== Linting autotools configurations ==="
          echo "Note: Running in informational mode - issues will be reported but won't fail the build"
          echo "This helps identify areas for improvement without blocking development"
          echo ""
          source build-common.sh
          
          # Lint prerequisite libraries that use autotools
          for lib in gmp mpfr mpc isl expat; do
            if [ -d "src/$lib" ]; then
              echo "Linting src/$lib..."
              if [ -f "src/$lib/configure.ac" ] || [ -f "src/$lib/configure.in" ]; then
                # Run in informational mode (default)
                lint_autotools "src/$lib" || true
              fi
              echo ""
            fi
          done
          
          echo "Autotools linting completed (informational mode)"

      - name: Check for autotools drift
        shell: bash
        run: |
          echo "=== Checking for autotools drift ==="
          source build-common.sh
          
          # Check components that track autogenerated files
          # Note: Prerequisites (gmp, mpfr, mpc, isl, expat) regenerate on each build, so skip them
          
          for component in newlib gdb; do
            if [ -d "src/$component" ]; then
              echo "Checking drift for src/$component..."
              if [ -f "src/$component/configure.ac" ] || [ -f "src/$component/configure.in" ]; then
                check_autotools_drift "src/$component" || {
                  echo "ERROR: Drift detected in src/$component"
                  echo "Please regenerate autotools files with: cd src/$component && autoreconf -fi"
                  exit 1
                }
              fi
            fi
          done
          
          echo "No drift detected - all autogenerated files are in sync"

  build:
    name: Build Toolchain
    runs-on: ubuntu-latest
    needs: lint-and-check

    permissions:
      # contents: read - Required to checkout the repository code
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6.0.1

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf autoconf2.69 automake libtool autogen \
            build-essential bison flex texinfo texlive \
            libgmp-dev libmpfr-dev libmpc-dev \
            git python3 shellcheck

      - name: Build Prerequisites
        shell: bash
        run: |
          ./build-prerequisites.sh
