---
name: Build toolchain

on:
  workflow_dispatch:

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4.2.2

      - name: Install dependencies
        shell: bash
        run: |
          apt list --installed | grep automake
          exit 1

      - name: Build Prerequisites
        shell: bash
        run: |
          ./build-prerequisites.sh
