---
name: Validate Toolchain on PR

on:
  pull_request:
    # Run on pull requests to validate toolchain

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build-container:
    name: Build Container for PR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5.0.0

      - name: Free up disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          
          # Remove unnecessary software to free up space
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          
          echo "=== Disk space after cleanup ==="
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/gnu-tools-for-stm32
          tags: |
            type=ref,event=pr

      - name: Build and push Docker container
        id: docker_build
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Don't load to local daemon - save disk space
          outputs: type=registry

      - name: Check disk space after build
        run: |
          echo "=== Disk space after build ==="
          df -h

  validate:
    name: Run Validation
    needs: build-container
    uses: ./.github/workflows/validate-toolchain-reusable.yml
    permissions:
      contents: read
      packages: read
    with:
      container-image: ghcr.io/${{ github.repository_owner }}/gnu-tools-for-stm32:pr-${{ github.event.pull_request.number }}
      artifact-name-suffix: -pr-${{ github.event.pull_request.number }}
    secrets: inherit

  cleanup:
    name: Cleanup PR Container
    runs-on: ubuntu-latest
    needs: [build-container, validate]
    if: always()

    permissions:
      packages: write

    steps:
      - name: Delete PR container image
        run: |
          echo "Deleting PR container image from GHCR..."
          # Note: This requires the GitHub CLI and appropriate permissions
          # For now, we rely on GHCR's automatic cleanup of untagged images
          # Manual cleanup can be done via GitHub UI or API if needed
          echo "PR container ghcr.io/${{ github.repository_owner }}/gnu-tools-for-stm32:pr-${{ github.event.pull_request.number }} will be cleaned up automatically"
