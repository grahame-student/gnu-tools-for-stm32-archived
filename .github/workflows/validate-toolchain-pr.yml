---
name: Validate Toolchain on PR

on:
  pull_request:
    # Run on pull requests to validate toolchain

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build-container:
    name: Build Container for PR
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      image-digest: ${{ steps.docker_build.outputs.digest }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5.0.0

      - name: Free up disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          
          # Remove unnecessary software to free up space
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          
          echo "=== Disk space after cleanup ==="
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Build Docker container
        id: docker_build
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          tags: gnu-tools-for-stm32:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Export to Docker format for saving as artifact
          outputs: type=docker,dest=/tmp/toolchain-image.tar

      - name: Compress Docker image
        run: |
          echo "=== Compressing Docker image ==="
          gzip /tmp/toolchain-image.tar
          ls -lh /tmp/toolchain-image.tar.gz
          echo "Image size: $(du -h /tmp/toolchain-image.tar.gz | cut -f1)"

      - name: Upload Docker image as artifact
        uses: actions/upload-artifact@v4.5.0
        with:
          name: toolchain-container-pr-${{ github.event.pull_request.number }}
          path: /tmp/toolchain-image.tar.gz
          retention-days: 1
          compression-level: 0  # Already compressed with gzip

      - name: Check disk space after build
        run: |
          echo "=== Disk space after build ==="
          df -h

  validate:
    name: Validate Toolchain
    needs: build-container
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5.0.0

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4.5.0
        with:
          name: toolchain-container-pr-${{ github.event.pull_request.number }}
          path: /tmp

      - name: Load Docker image
        run: |
          echo "=== Loading Docker image ==="
          gunzip /tmp/toolchain-image.tar.gz
          docker load --input /tmp/toolchain-image.tar
          rm /tmp/toolchain-image.tar
          
          echo "=== Loaded images ==="
          docker images

      - name: Create output directory
        run: |
          mkdir -p ${{ github.workspace }}/build-output
          chmod 777 ${{ github.workspace }}/build-output

      - name: Build test project in container
        run: |
          echo "Building test project..."
          docker run --rm \
            -v ${{ github.workspace }}/test_project:/project:ro \
            -v ${{ github.workspace }}/build-output:/output \
            gnu-tools-for-stm32:pr-${{ github.event.pull_request.number }} \
            /project /output

      - name: List build artifacts
        run: |
          echo "=== Build Artifacts ==="
          ls -lh ${{ github.workspace }}/build-output/

      - name: Compare artifacts with reference files
        run: |
          echo "=== Comparing Build Artifacts with Reference Files ==="
          
          # Define artifacts to compare
          ARTIFACTS=("nucleo-u083rc.elf" "nucleo-u083rc.map" "nucleo-u083rc.hex" "nucleo-u083rc.bin")
          
          DIFFERENCES_FOUND=0
          
          for artifact in "${ARTIFACTS[@]}"; do
            echo ""
            echo "Comparing $artifact..."
            
            if [ ! -f "${{ github.workspace }}/build-output/$artifact" ]; then
              echo "ERROR: Build artifact not found: $artifact"
              DIFFERENCES_FOUND=1
              continue
            fi
            
            if [ ! -f "${{ github.workspace }}/test_project/reference/$artifact" ]; then
              echo "WARNING: Reference file not found: $artifact"
              echo "This may be expected for a new artifact type"
              continue
            fi
            
            # Compare files byte-by-byte
            if cmp -s "${{ github.workspace }}/build-output/$artifact" \
                     "${{ github.workspace }}/test_project/reference/$artifact"; then
              echo "✓ $artifact matches reference"
            else
              echo "✗ $artifact differs from reference"
              DIFFERENCES_FOUND=1
              
              # Show file sizes for debugging
              echo "  Build artifact size: $(stat -c%s ${{ github.workspace }}/build-output/$artifact) bytes"
              echo "  Reference file size: $(stat -c%s ${{ github.workspace }}/test_project/reference/$artifact) bytes"
              
              # For text files (map), show a diff sample
              if [[ "$artifact" == *.map ]]; then
                echo "  First 20 lines of diff:"
                diff -u "${{ github.workspace }}/test_project/reference/$artifact" \
                       "${{ github.workspace }}/build-output/$artifact" | head -20 || true
              fi
            fi
          done
          
          echo ""
          if [ $DIFFERENCES_FOUND -eq 0 ]; then
            echo "=== SUCCESS: All artifacts match reference files ==="
            exit 0
          else
            echo "=== FAILURE: One or more artifacts differ from reference files ==="
            exit 1
          fi

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4.5.0
        with:
          name: build-artifacts-pr-${{ github.event.pull_request.number }}
          path: ${{ github.workspace }}/build-output/
          retention-days: 7
