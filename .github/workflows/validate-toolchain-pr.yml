---
name: Validate Toolchain on PR

on:
  pull_request:
    # Run on pull requests to validate toolchain

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build-container:
    name: Build Container for PR
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5.0.0

      - name: Free up disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          
          # Remove unnecessary software to free up space
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          
          echo "=== Disk space after cleanup ==="
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Build Docker container
        id: docker_build
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          load: true
          tags: gnu-tools-for-stm32:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate:
    name: Run Validation
    needs: build-container
    uses: ./.github/workflows/validate-toolchain-reusable.yml
    permissions:
      contents: read
    with:
      container-image: gnu-tools-for-stm32:pr-${{ github.event.pull_request.number }}
      artifact-name-suffix: -pr-${{ github.event.pull_request.number }}

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: validate
    if: always()

    steps:
      - name: Clean up Docker images
        run: |
          echo "=== Cleaning up Docker images ==="
          docker image rm gnu-tools-for-stm32:pr-${{ github.event.pull_request.number }} || true
          
          echo "=== Final disk space ==="
          df -h
