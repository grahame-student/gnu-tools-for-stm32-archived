---
name: Build Container (Reusable)

on:
  workflow_call:
    inputs:
      push:
        description: 'Whether to push the built container to registry'
        required: false
        type: boolean
        default: false
      tags:
        description: 'Container tags to apply'
        required: false
        type: string
        default: 'gnu-tools-for-stm32:latest'
    outputs:
      image-digest:
        description: 'Digest of the built image'
        value: ${{ jobs.build.outputs.digest }}

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    
    outputs:
      digest: ${{ steps.docker_build.outputs.digest }}
    
    permissions:
      contents: read
      packages: write  # Required if pushing to GHCR
    
    steps:
      - name: Checkout source code
        uses: actions/checkout@v5.0.0
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1
      
      - name: Login to GitHub Container Registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build (and optionally push) Docker container
        id: docker_build
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          load: ${{ !inputs.push }}
          push: ${{ inputs.push }}
          tags: ${{ inputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
