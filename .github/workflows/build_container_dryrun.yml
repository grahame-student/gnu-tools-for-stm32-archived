---
name: create container - dry run

on:
  workflow_dispatch:

  pull_request:
    # Run on pull requests (default types: opened, synchronize, reopened)

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  # Build and validate critical stages (bootstrap, binutils-gcc-first, newlib, and gcc-final-gdb)
  # Later stages (runtime-libs) will be incrementally added in future PRs
  build-critical-stages:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0

      - name: "Login to github docker registry"
        uses: docker/login-action@v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and cache the bootstrap stage explicitly
      # This ensures the bootstrap layer is cached even if later stages fail
      - name: Build and Cache Bootstrap Stage
        id: bootstrap
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          target: bootstrap
          tags: |
            ghcr.io/${{ github.repository }}:bootstrap-${{ github.sha }}
            ghcr.io/${{ github.repository }}:bootstrap-latest
          cache-from: type=gha,scope=bootstrap
          cache-to: type=gha,mode=max,scope=bootstrap
          push: false
        # Continue even if this step fails to preserve any successfully built layers
        # The workflow will still fail later if bootstrap failed (see Report Build Status)
        continue-on-error: true

      # Build and cache the binutils-gcc-first stage explicitly
      # This ensures the binutils-gcc-first layer is cached even if later stages fail
      - name: Build and Cache Binutils-GCC-First Stage
        id: binutils-gcc-first
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          target: binutils-gcc-first
          tags: |
            ghcr.io/${{ github.repository }}:binutils-gcc-first-${{ github.sha }}
            ghcr.io/${{ github.repository }}:binutils-gcc-first-latest
          cache-from: |
            type=gha,scope=bootstrap
            type=gha,scope=binutils-gcc-first
          cache-to: type=gha,mode=max,scope=binutils-gcc-first
          push: false
        # Continue even if this step fails to preserve any successfully built layers
        continue-on-error: true

      # Build and cache the newlib stage explicitly
      # This ensures the newlib layer is cached even if later stages fail
      - name: Build and Cache Newlib Stage
        id: newlib
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          target: newlib
          tags: |
            ghcr.io/${{ github.repository }}:newlib-${{ github.sha }}
            ghcr.io/${{ github.repository }}:newlib-latest
          cache-from: |
            type=gha,scope=bootstrap
            type=gha,scope=binutils-gcc-first
            type=gha,scope=newlib
          cache-to: type=gha,mode=max,scope=newlib
          push: false
        # Continue even if this step fails to preserve any successfully built layers
        continue-on-error: true

      # Free up disk space before building gcc-final-gdb (the largest stage)
      # GitHub Actions runners have ~14GB free space, and building all stages can exhaust it
      - name: Free Disk Space Before GCC-Final-GDB Build
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          echo "=== Removing unnecessary software ==="
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          echo "=== Disk space after cleanup ==="
          df -h

      # Build and cache the gcc-final-gdb stage explicitly
      # This ensures the gcc-final-gdb layer is cached even if later stages fail
      - name: Build and Cache GCC-Final-GDB Stage
        id: gcc-final-gdb
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          target: gcc-final-gdb
          tags: |
            ghcr.io/${{ github.repository }}:gcc-final-gdb-${{ github.sha }}
            ghcr.io/${{ github.repository }}:gcc-final-gdb-latest
          cache-from: |
            type=gha,scope=bootstrap
            type=gha,scope=binutils-gcc-first
            type=gha,scope=newlib
            type=gha,scope=gcc-final-gdb
          cache-to: type=gha,mode=max,scope=gcc-final-gdb
          push: false
        # Continue even if this step fails to preserve any successfully built layers
        continue-on-error: true

      # Build and cache the runtime-libs stage explicitly
      # This ensures the runtime-libs layer is cached even if later stages fail
      - name: Build and Cache Runtime-Libs Stage
        id: runtime-libs
        uses: docker/build-push-action@v6.18.0
        with:
          context: .
          target: runtime-libs
          tags: |
            ghcr.io/${{ github.repository }}:runtime-libs-${{ github.sha }}
            ghcr.io/${{ github.repository }}:runtime-libs-latest
          cache-from: |
            type=gha,scope=bootstrap
            type=gha,scope=binutils-gcc-first
            type=gha,scope=newlib
            type=gha,scope=gcc-final-gdb
            type=gha,scope=runtime-libs
          cache-to: type=gha,mode=max,scope=runtime-libs
          push: false
        # Continue even if this step fails to preserve any successfully built layers
        continue-on-error: true

      # TODO: Future optimization - add main (final) stage if needed
      # - name: Build Main Stage
      #   id: docker_build
      #   uses: docker/build-push-action@v6.18.0
      #   with:
      #     context: .
      #     target: main
      #     cache-from: |
      #       type=gha,scope=bootstrap
      #       type=gha,scope=binutils-gcc-first
      #       type=gha,scope=newlib
      #       type=gha,scope=gcc-final-gdb
      #       type=gha,scope=runtime-libs
      #       type=gha,scope=build
      #     cache-to: type=gha,mode=max,scope=build
      #     push: false
      #   continue-on-error: true

      - name: Report Build Status
        if: always()
        run: |
          echo "=== Build Status Summary ==="
          echo "Bootstrap stage: ${{ steps.bootstrap.outcome }}"
          echo "Binutils-GCC-First stage: ${{ steps.binutils-gcc-first.outcome }}"
          echo "Newlib stage: ${{ steps.newlib.outcome }}"
          echo "GCC-Final-GDB stage: ${{ steps.gcc-final-gdb.outcome }}"
          echo "Runtime-Libs stage: ${{ steps.runtime-libs.outcome }}"
          
          if [ "${{ steps.bootstrap.outcome }}" = "success" ]; then
            echo "✓ Bootstrap stage completed successfully"
            echo "  - Future builds will reuse bootstrap cache"
            echo "  - Cache scope: bootstrap"
          else
            echo "✗ Bootstrap stage failed"
          fi
          
          if [ "${{ steps.binutils-gcc-first.outcome }}" = "success" ]; then
            echo "✓ Binutils-GCC-First stage completed successfully"
            echo "  - Future builds will reuse binutils-gcc-first cache"
            echo "  - Cache scope: binutils-gcc-first"
          else
            echo "✗ Binutils-GCC-First stage failed (bootstrap cache preserved)"
          fi
          
          if [ "${{ steps.newlib.outcome }}" = "success" ]; then
            echo "✓ Newlib stage cached successfully"
            echo "  - Future builds will reuse newlib cache"
            echo "  - Cache scope: newlib"
          else
            echo "✗ Newlib stage failed (earlier stage caches preserved)"
          fi
          
          if [ "${{ steps.gcc-final-gdb.outcome }}" = "success" ]; then
            echo "✓ GCC-Final-GDB stage cached successfully"
            echo "  - Future builds will reuse gcc-final-gdb cache"
            echo "  - Cache scope: gcc-final-gdb"
          else
            echo "✗ GCC-Final-GDB stage failed (earlier stage caches preserved)"
          fi
          
          if [ "${{ steps.runtime-libs.outcome }}" = "success" ]; then
            echo "✓ Runtime-Libs stage cached successfully"
            echo "  - Future builds will reuse runtime-libs cache"
            echo "  - Cache scope: runtime-libs"
          else
            echo "✗ Runtime-Libs stage failed (earlier stage caches preserved)"
          fi
          
          # Fail the job if bootstrap failed (critical)
          if [ "${{ steps.bootstrap.outcome }}" != "success" ]; then
            echo "ERROR: Bootstrap stage is critical and must succeed"
            exit 1
          fi
          
          # Fail the job if binutils-gcc-first failed (critical)
          if [ "${{ steps.binutils-gcc-first.outcome }}" != "success" ]; then
            echo "ERROR: Binutils-GCC-First stage is critical and must succeed"
            exit 1
          fi
          
          # Fail the job if newlib failed (critical)
          if [ "${{ steps.newlib.outcome }}" != "success" ]; then
            echo "ERROR: Newlib stage is critical and must succeed"
            exit 1
          fi
          
          # Fail the job if gcc-final-gdb failed (critical)
          if [ "${{ steps.gcc-final-gdb.outcome }}" != "success" ]; then
            echo "ERROR: GCC-Final-GDB stage is critical and must succeed"
            exit 1
          fi
          
          # Fail the job if runtime-libs failed (critical)
          if [ "${{ steps.runtime-libs.outcome }}" != "success" ]; then
            echo "ERROR: Runtime-Libs stage is critical and must succeed"
            exit 1
          fi
          
          echo ""
          echo "✓ All active stages completed successfully"
          echo "  - Bootstrap, binutils-gcc-first, newlib, gcc-final-gdb, and runtime-libs validated"
          echo "  - Complete build pipeline validated"
