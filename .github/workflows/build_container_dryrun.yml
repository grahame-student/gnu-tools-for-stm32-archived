---
name: create container - dry run

on:
  workflow_dispatch:
#  merge_group:

#  pull_request_target:
#    branches: ['dependabot/**']

# Note: pull_request trigger removed to avoid duplicate runs with validate-toolchain.yml
# The validate-toolchain workflow now handles full validation on PRs

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  dry-run-docker-build:
    name: Build Container (Dry Run)
    uses: ./.github/workflows/build-container.yml
    with:
      push: false
      tags: gnu-tools-for-stm32:latest
    permissions:
      contents: read
      packages: write
