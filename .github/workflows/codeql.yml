---
name: CodeQL Security Analysis

on:
  push:
    branches:
      - 13.3.rel1
  pull_request:
    # Run on pull requests to any branch
  schedule:
    # Run at 00:00 UTC every Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest

    permissions:
      # actions: read - Required to read workflow artifacts and metadata
      # contents: read - Required to checkout the repository code
      # security-events: write - Required to upload CodeQL results to GitHub Security tab
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # CodeQL supports multiple languages including C/C++, Python, JavaScript
        # This repo contains Python scripts in src/expat, src/isl, and src/gdb
        # For shell scripts, CodeQL has limited support, so we rely on shellcheck
        language: [ 'python' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.31.3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      # Autobuild attempts to build any compiled languages (C/C++, etc.)
      # Since this is mainly a build system with scripts, autobuild may not find much
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4.31.3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.31.3
        with:
          category: "/language:${{ matrix.language }}"

  shellcheck-analysis:
    name: Shell Script Security Analysis
    runs-on: ubuntu-latest

    permissions:
      # contents: read - Required to checkout the repository code
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Find shell scripts
        id: find-scripts
        run: |
          # Find all shell scripts (.sh files and executable build-* scripts in root)
          # Exclude .git directory to avoid checking git internals
          # Only include build-* files from the root directory that are shell scripts
          SCRIPTS=$(find . -type f -name "*.sh" | grep -v ".git" | sort -u)
          # Add root-level build-* scripts that don't end in .sh
          shopt -s nullglob
          for file in ./build-*; do
            if [ -f "$file" ] && [[ "$file" != *.sh ]] && [[ "$file" != *.md ]]; then
              # Check if file has a shell shebang
              if head -n 1 "$file" | grep -q '^#!.*sh'; then
                SCRIPTS="$SCRIPTS"$'\n'"$file"
              fi
            fi
          done
          SCRIPTS=$(echo "$SCRIPTS" | sort -u | tr '\n' ' ')
          echo "scripts=$SCRIPTS" >> $GITHUB_OUTPUT
          echo "Found scripts: $SCRIPTS"

      - name: Run shellcheck on all shell scripts
        env:
          SHELL_SCRIPTS: ${{ steps.find-scripts.outputs.scripts }}
        run: |
          echo "=== Running shellcheck security analysis ==="
          
          has_errors=0
          for script in $SHELL_SCRIPTS; do
            echo "Analyzing $script..."
            # Run shellcheck with security-focused checks
            if ! shellcheck \
              -e SC1091,SC2148 \
              -f gcc \
              "$script"; then
              has_errors=1
            fi
          done
          
          if [ $has_errors -eq 1 ]; then
            echo "ERROR: Shell scripts have security or quality issues"
            exit 1
          fi
          
          echo "All shell scripts passed security analysis"

      - name: Run shellcheck with JSON output
        # This step generates JSON format output for artifact storage
        continue-on-error: true
        env:
          SHELL_SCRIPTS: ${{ steps.find-scripts.outputs.scripts }}
        run: |
          mkdir -p shellcheck-results
          
          for script in $SHELL_SCRIPTS; do
            # Create a unique filename by replacing / with _ and removing leading ./
            safe_name=$(echo "$script" | sed 's|^\./||' | sed 's|/|_|g')
            # Generate JSON output for artifact storage (excluding the same checks as the main analysis)
            shellcheck -e SC1091,SC2148 -f json "$script" > "shellcheck-results/${safe_name}.json" || true
          done
          
          # Verify that files were created
          file_count=$(find shellcheck-results -name "*.json" -type f | wc -l)
          echo "Created $file_count JSON result files"

      - name: Upload shellcheck results
        # Upload results even if some checks failed, but only if files exist
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v5.0.0
        with:
          name: shellcheck-results
          path: shellcheck-results/*.json
          if-no-files-found: warn
          retention-days: 30
